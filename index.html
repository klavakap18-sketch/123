<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Редактор таймера для Genially</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
h2 { margin-bottom: 10px; }
label { display: block; margin-top: 10px; }
input[type="color"], input[type="number"], select, input[type="file"] { margin-top: 5px; }
#preview-container { 
  margin-top: 20px; padding: 20px; 
  width: 320px; height: 150px; 
  border: 2px solid #333; border-radius: 10px; 
  background: transparent; position: relative; 
}
#progress-bar { width: 100%; height: 40px; background: #ddd; border-radius: 5px; overflow: hidden; }
#progress { height: 100%; width: 100%; background: #4caf50; transition: width 1s linear; }
#time { font-size: 24px; margin-top: 10px; text-align: center; color: #000; }
#timer-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; border-radius: 10px; }
button { margin-top: 10px; padding: 5px 10px; font-size: 16px; }
textarea { width: 100%; height: 150px; margin-top: 10px; font-family: monospace; }
</style>
</head>
<body>

<h2>Редактор обратного таймера для Genially</h2>

<label>Минуты: <input type="number" id="minutes" min="0" value="0"></label>
<label>Секунды: <input type="number" id="seconds" min="0" max="59" value="30"></label>
<label>Цвет прогресс-бара: <input type="color" id="barColor" value="#4caf50"></label>
<label>Цвет цифр: <input type="color" id="textColor" value="#000000"></label>
<label>Шрифт цифр: 
<select id="fontSelect">
  <option value="Arial">Arial</option>
  <option value="Verdana">Verdana</option>
  <option value="Tahoma">Tahoma</option>
  <option value="Courier New">Courier New</option>
</select>
</label>
<label>Размер цифр (px): <input type="number" id="fontSize" value="24"></label>
<label>Загрузить картинку для таймера: <input type="file" id="timerImage" accept="image/*"></label>
<label>Звуковой сигнал при завершении: <input type="file" id="alarmAudio" accept="audio/*"></label>

<button id="start-btn">Предпросмотр</button>
<button id="generate-btn">Сгенерировать HTML-код</button>

<div id="preview-container">
  <img id="timer-img" src="" alt="">
  <div id="progress-bar"><div id="progress"></div></div>
  <div id="time">00:30</div>
</div>

<textarea id="generated-code" readonly placeholder="Сюда будет сгенерирован код для вставки в Genially..."></textarea>

<script>
const progress = document.getElementById('progress');
const timeDisplay = document.getElementById('time');
const timerImg = document.getElementById('timer-img');

let timerInterval;
let alarmAudio = null;

// Предпросмотр таймера
function startPreview(){
  clearInterval(timerInterval);

  const minutes = parseInt(document.getElementById('minutes').value)||0;
  const seconds = parseInt(document.getElementById('seconds').value)||0;
  let totalTime = minutes*60 + seconds;
  let timeLeft = totalTime;

  progress.style.background = document.getElementById('barColor').value;
  timeDisplay.style.color = document.getElementById('textColor').value;
  timeDisplay.style.fontFamily = document.getElementById('fontSelect').value;
  timeDisplay.style.fontSize = document.getElementById('fontSize').value + 'px';

  function updateTimer(){
    timeDisplay.textContent = `${String(Math.floor(timeLeft/60)).padStart(2,'0')}:${String(timeLeft%60).padStart(2,'0')}`;
    progress.style.width = (timeLeft/totalTime*100) + '%';
    if(timeLeft<=0){
      clearInterval(timerInterval);
      if(alarmAudio) alarmAudio.play();
    }
    timeLeft--;
  }

  updateTimer();
  timerInterval = setInterval(updateTimer,1000);
}

document.getElementById('start-btn').addEventListener('click', startPreview);

// Загрузка картинки
document.getElementById('timerImage').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(file){
    timerImg.src = URL.createObjectURL(file);
  }
});

// Загрузка аудио
document.getElementById('alarmAudio').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(file){
    alarmAudio = new Audio(URL.createObjectURL(file));
  }
});

// Генерация HTML кода для iframe
document.getElementById('generate-btn').addEventListener('click', function(){
  const minutes = parseInt(document.getElementById('minutes').value)||0;
  const seconds = parseInt(document.getElementById('seconds').value)||0;
  const barColor = document.getElementById('barColor').value;
  const textColor = document.getElementById('textColor').value;
  const font = document.getElementById('fontSelect').value;
  const fontSize = document.getElementById('fontSize').value;

  const imgTag = timerImg.src ? `<img src="${timerImg.src}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.3;border-radius:10px;">` : '';
  const audioTag = alarmAudio ? `<audio id="alarm" src="${alarmAudio.src}"></audio>` : '';

  const iframeCode = `<iframe srcdoc='
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:transparent;font-family:${font};}
#container{width:320px;height:150px;position:relative;}
#progress-bar{width:100%;height:40px;background:#ddd;border-radius:5px;overflow:hidden;}
#progress{height:100%;width:100%;background:${barColor};transition:width 1s linear;}
#time{font-size:${fontSize}px;color:${textColor};text-align:center;margin-top:10px;}
</style>
</head>
<body>
<div id="container">
${imgTag}
<div id="progress-bar"><div id="progress"></div></div>
<div id="time">${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}</div>
${audioTag}
</div>
<script>
let totalTime=${minutes*60+seconds}, timeLeft=totalTime;
const progress=document.getElementById("progress");
const timeDisplay=document.getElementById("time");
${alarmAudio ? 'const alarm=document.getElementById("alarm");' : ''}
function updateTimer(){
  timeDisplay.textContent = String(Math.floor(timeLeft/60)).padStart(2,"0")+":"+String(timeLeft%60).padStart(2,"0");
  progress.style.width = (timeLeft/totalTime*100)+"%";
  if(timeLeft<=0){
    clearInterval(timerInterval);
    ${alarmAudio ? 'alarm.play();':''}
  }
  timeLeft--;
}
updateTimer();
setInterval(updateTimer,1000);
</script>
</body>
</html>' style="border:none;width:340px;height:170px;background:transparent;"></iframe>`;

  document.getElementById('generated-code').value = iframeCode;
});
</script>

</body>
</html>
